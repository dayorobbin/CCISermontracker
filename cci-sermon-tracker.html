<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>CCI Daily Sermon Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A050;
  --gold-lt: #E2BA74;
  --gold-dim: rgba(201,160,80,0.12);
  --ink: #0C0B08;
  --ink2: #161410;
  --paper: #F5F0E8;
  --muted: #7A6E58;
  --muted2: #5A5142;
  --border: rgba(201,160,80,0.2);
  --border2: rgba(255,255,255,0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--paper);-webkit-font-smoothing:antialiased;overflow:hidden}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;background:var(--ink)}
.app::before{content:'';position:fixed;top:-80px;left:50%;transform:translateX(-50%);width:320px;height:320px;background:radial-gradient(circle,rgba(201,160,80,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}

/* HEADER */
.header{position:relative;z-index:2;padding:32px 22px 18px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.brand-row{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.brand-orb{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center}
.brand-orb::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--gold);opacity:.75}
.brand-name{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:500}
.header-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;line-height:1.1;color:var(--paper)}
.header-title em{font-style:italic;color:var(--gold-lt)}
.header-verse{font-size:11.5px;color:var(--muted);margin-top:6px;font-style:italic}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:0.5px solid var(--border);flex-shrink:0;position:relative;z-index:2}
.stat-cell{padding:11px 8px;text-align:center;border-right:0.5px solid var(--border)}
.stat-cell:last-child{border-right:none}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold-lt);line-height:1;margin-bottom:2px}
.stat-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

/* TAB NAV */
.tab-nav{display:flex;border-bottom:0.5px solid var(--border);flex-shrink:0;position:relative;z-index:2}
.tab-btn{flex:1;padding:10px 0;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color .2s,border-color .2s}
.tab-btn.active{color:var(--gold-lt);border-bottom-color:var(--gold)}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;padding:11px 18px;gap:10px;border-bottom:0.5px solid var(--border2);flex-shrink:0;position:relative;z-index:2}
.wn-btn{width:28px;height:28px;border-radius:50%;background:transparent;border:0.5px solid var(--border);color:var(--gold);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.wn-btn:hover{background:var(--gold-dim)}
.wn-btn:disabled{opacity:.25;cursor:default}
.wn-info{flex:1;text-align:center}
.wn-week{font-size:12px;font-weight:500;color:var(--paper);margin-bottom:1px}
.wn-theme{font-size:10.5px;color:var(--muted);font-style:italic}

/* PROGRESS */
.prog-track{height:2px;background:rgba(255,255,255,.05);flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-lt));transition:width .5s ease}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:1;scrollbar-width:thin;scrollbar-color:rgba(201,160,80,.2) transparent}
.scroll-area::-webkit-scrollbar{width:3px}
.scroll-area::-webkit-scrollbar-thumb{background:rgba(201,160,80,.2);border-radius:99px}

/* PAGES */
.page{display:none}
.page.active{display:flex;flex-direction:column;flex:1;min-height:0}

/* DAY CARDS */
.days-list{padding:6px 0 40px}
.day-card{border-bottom:0.5px solid rgba(255,255,255,.04)}
.day-row{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;transition:background .15s}
.day-row:hover{background:rgba(255,255,255,.02)}
.check-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .22s}
.check-btn:hover{border-color:var(--gold)}
.check-btn.done{background:var(--gold);border-color:var(--gold)}
.check-icon{width:9px;height:6px;border-left:2px solid var(--ink);border-bottom:2px solid var(--ink);transform:rotate(-45deg) translate(1px,-1px);display:none}
.check-btn.done .check-icon{display:block}
.day-meta{flex:1;min-width:0}
.day-name{font-size:13px;font-weight:500;color:var(--paper);margin-bottom:2px}
.day-topic{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-tag{font-size:9px;letter-spacing:.09em;text-transform:uppercase;padding:3px 7px;border-radius:99px;border:0.5px solid;font-weight:500;flex-shrink:0;white-space:nowrap}
.chevron{width:14px;height:14px;flex-shrink:0;opacity:.3;transition:transform .22s,opacity .2s}
.chevron.open{transform:rotate(180deg);opacity:.6}

/* EXPANDED BODY */
.day-body{overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1);padding:0 18px 0 58px}
.day-body.open{max-height:1200px}
.sermon-item{border-radius:9px;padding:11px 12px;margin-bottom:8px;border:0.5px solid rgba(255,255,255,.06);background:rgba(255,255,255,.025);position:relative;overflow:hidden}
.s-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.s-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--paper);line-height:1.3;margin-bottom:4px}
.s-desc{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:9px}
.spotify-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:0.5px solid rgba(29,185,84,.4);border-radius:99px;padding:5px 10px;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500;color:#1DB954;cursor:pointer;text-decoration:none;letter-spacing:.04em;transition:background .15s}
.spotify-btn:hover{background:rgba(29,185,84,.08)}
.spotify-icon{width:12px;height:12px;fill:#1DB954;flex-shrink:0}
.notes-wrap{padding-top:2px;margin-bottom:12px}
.notes-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.notes-ta{width:100%;background:rgba(255,255,255,.025);border:0.5px solid rgba(255,255,255,.07);border-radius:8px;padding:8px 10px;font-size:11.5px;font-family:'DM Sans',sans-serif;color:var(--paper);resize:none;height:64px;outline:none;line-height:1.6;transition:border-color .18s}
.notes-ta:focus{border-color:rgba(201,160,80,.35)}
.notes-ta::placeholder{color:var(--muted2)}
.done-tick{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--gold);margin-bottom:7px;opacity:.9}

/* BROWSE PAGE */
.browse-wrap{padding:14px 18px 48px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-chip{font-size:10px;padding:4px 10px;border-radius:99px;border:0.5px solid;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;font-weight:500;letter-spacing:.04em;background:transparent}
.filter-chip:not(.active){opacity:.35}
.filter-chip.active{opacity:1}
.ep-list{display:flex;flex-direction:column;gap:8px}
.ep-card{background:rgba(255,255,255,.025);border:0.5px solid rgba(255,255,255,.06);border-radius:9px;padding:11px 13px;position:relative;overflow:hidden}
.ep-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.ep-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--paper);line-height:1.3;flex:1}
.ep-date{font-size:9.5px;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-top:2px}
.ep-series{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.ep-desc{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:9px}
.ep-footer{display:flex;align-items:center;justify-content:space-between}
.ep-dur{font-size:9.5px;color:var(--muted2)}

/* OVERVIEW */
.ov-wrap{padding:18px 18px 48px}
.ov-lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:11px;margin-top:20px}
.ov-lbl:first-child{margin-top:0}
.ov-week-card{background:rgba(255,255,255,.025);border:0.5px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.ov-week-card:hover{background:rgba(201,160,80,.06)}
.ov-wk-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.ov-wk-num{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
.ov-wk-count{font-size:10.5px;color:var(--muted)}
.ov-wk-theme{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--paper);margin-bottom:9px}
.mini-track{height:2px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.mini-fill{height:100%;background:var(--gold);border-radius:99px}
.cat-legend{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.cat-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.cat-leg-dot{width:7px;height:7px;border-radius:50%}

/* SVG icon shorthand */
.ic{display:inline-block}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="brand-row">
      <div class="brand-orb"></div>
      <span class="brand-name">CCI · Sermon Tracker</span>
    </div>
    <div class="header-title">Faith by <em>hearing</em></div>
    <div class="header-verse">Romans 10:17 — One sermon a day. Every day.</div>
  </div>

  <div class="stats-bar">
    <div class="stat-cell"><div class="stat-val" id="s-week">0/7</div><div class="stat-lbl">This week</div></div>
    <div class="stat-cell"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Total done</div></div>
    <div class="stat-cell"><div class="stat-val" id="s-streak">0</div><div class="stat-lbl">Streak</div></div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('schedule')">Schedule</button>
    <button class="tab-btn" onclick="switchTab('browse')">Browse</button>
    <button class="tab-btn" onclick="switchTab('overview')">Overview</button>
  </div>

  <!-- SCHEDULE PAGE -->
  <div class="page active" id="page-schedule">
    <div class="week-nav">
      <button class="wn-btn" id="btn-prev" onclick="changeWeek(-1)">&#8592;</button>
      <div class="wn-info">
        <div class="wn-week" id="wn-week">Week 1</div>
        <div class="wn-theme" id="wn-theme"></div>
      </div>
      <button class="wn-btn" id="btn-next" onclick="changeWeek(1)">&#8594;</button>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="scroll-area"><div class="days-list" id="days-list"></div></div>
  </div>

  <!-- BROWSE PAGE -->
  <div class="page" id="page-browse">
    <div class="scroll-area">
      <div class="browse-wrap">
        <div class="filter-row" id="filter-row"></div>
        <div class="ep-list" id="ep-list"></div>
      </div>
    </div>
  </div>

  <!-- OVERVIEW PAGE -->
  <div class="page" id="page-overview">
    <div class="scroll-area"><div class="ov-wrap" id="ov-wrap"></div></div>
  </div>

</div>

];

function spLink(ep) {
  if (ep.id === 'x') return SHOW_URL;
  return `https://open.spotify.com/episode/${ep.id}`;
}

const WEEKS = [
  { week:1, theme:'Foundations of faith', days:[
    { day:'Monday',    cat:'faith',    topic:'Faith comes by hearing',            eps:[4,23] },
    { day:'Tuesday',   cat:'identity', topic:'Who you are in Christ',             eps:[6,11] },
    { day:'Wednesday', cat:'grace',    topic:'The grace that empowers',           eps:[24,3] },
    { day:'Thursday',  cat:'word',     topic:'The power of the Word',             eps:[22] },
    { day:'Friday',    cat:'prayer',   topic:'Building a prayer life',            eps:[5,15] },
    { day:'Saturday',  cat:'purpose',  topic:'Becoming, not just believing',      eps:[2] },
    { day:'Sunday',    cat:'special',  topic:'Selah — reflect & declare',         eps:[9,25] },
  ]},
  { week:2, theme:'Love, relationship & family', days:[
    { day:'Monday',    cat:'family',   topic:'Love Code — break glass',           eps:[0,1] },
    { day:'Tuesday',   cat:'family',   topic:'Marriage — God\'s way',             eps:[20,21] },
    { day:'Wednesday', cat:'family',   topic:'Family as God\'s strategy',         eps:[14] },
    { day:'Thursday',  cat:'identity', topic:'Christmas & the real Christ',       eps:[10,11] },
    { day:'Friday',    cat:'grace',    topic:'Salvation — the full picture',      eps:[24,3] },
    { day:'Saturday',  cat:'identity', topic:'Boundary markers & consecration',   eps:[6,16] },
    { day:'Sunday',    cat:'special',  topic:'Prophetic declarations',            eps:[9] },
  ]},
  { week:3, theme:'The Holy Spirit & prayer', days:[
    { day:'Monday',    cat:'prayer',   topic:'Altars — divine advantage',         eps:[5] },
    { day:'Tuesday',   cat:'prayer',   topic:'Metamorphosis through prayer',      eps:[23,28] },
    { day:'Wednesday', cat:'prayer',   topic:'Charismatic gifts & culture',       eps:[19] },
    { day:'Thursday',  cat:'prayer',   topic:'Personal devotion & fasting',       eps:[15] },
    { day:'Friday',    cat:'faith',    topic:'Walk on water — faith tested',      eps:[4] },
    { day:'Saturday',  cat:'word',     topic:'Prophetic imagination',             eps:[22] },
    { day:'Sunday',    cat:'revival',  topic:'Faith is the language of revival',  eps:[13] },
  ]},
  { week:4, theme:'Dominion, warfare & overflow', days:[
    { day:'Monday',    cat:'warfare',  topic:'Know your enemy',                   eps:[17] },
    { day:'Tuesday',   cat:'warfare',  topic:'Positional authority in Christ',    eps:[18] },
    { day:'Wednesday', cat:'identity', topic:'Jesus: God or just good?',          eps:[16] },
    { day:'Thursday',  cat:'revival',  topic:'The church as living organism',     eps:[26,27] },
    { day:'Friday',    cat:'grace',    topic:'God\'s unstoppable move',           eps:[14,3] },
    { day:'Saturday',  cat:'purpose',  topic:'Compass — direction for your life', eps:[2,8] },
    { day:'Sunday',    cat:'special',  topic:'Ebenezer — look back & step forward', eps:[7,9] },
  ]},
];

let currentWeek=0, activePage='schedule', openDays={}, checked={}, notes={}, browseFilter='all';

function lsLoad(){try{checked=JSON.parse(localStorage.getItem('cci3_c')||'{}');}catch(e){}try{notes=JSON.parse(localStorage.getItem('cci3_n')||'{}');}catch(e){}}
function lsSave(){try{localStorage.setItem('cci3_c',JSON.stringify(checked));}catch(e){}try{localStorage.setItem('cci3_n',JSON.stringify(notes));}catch(e){}}
function K(w,d){return`w${w}d${d}`}
function doneW(wi){return WEEKS[wi].days.filter((_,di)=>checked[K(wi,di)]).length}
function totalDone(){return WEEKS.reduce((a,_,wi)=>a+doneW(wi),0)}
function streak(){let s=0;for(let wi=0;wi<WEEKS.length;wi++)for(let di=0;di<WEEKS[wi].days.length;di++){if(checked[K(wi,di)])s++;else return s}return s}

function renderStats(){
  const done=doneW(currentWeek),total=WEEKS[currentWeek].days.length;
  document.getElementById('s-week').textContent=`${done}/${total}`;
  document.getElementById('s-total').textContent=totalDone();
  const s=streak();
  document.getElementById('s-streak').textContent=s>0?`🔥${s}`:'0';
}

function renderSchedule(){
  const w=WEEKS[currentWeek];
  document.getElementById('wn-week').textContent=`Week ${w.week}`;
  document.getElementById('wn-theme').textContent=w.theme;
  document.getElementById('btn-prev').disabled=currentWeek===0;
  document.getElementById('btn-next').disabled=currentWeek===WEEKS.length-1;
  const done=doneW(currentWeek);
  document.getElementById('prog-fill').style.width=Math.round((done/w.days.length)*100)+'%';
  const list=document.getElementById('days-list');
  list.innerHTML='';
  w.days.forEach((day,di)=>{
    const k=K(currentWeek,di),isDone=!!checked[k],isOpen=!!openDays[k];
    const cat=CATS[day.cat]||CATS.faith;
    const dayEps=day.eps.map(i=>EP[i]).filter(Boolean);
    const card=document.createElement('div');
    card.className='day-card';
    const sermons=dayEps.map((ep,si)=>{
      const ec=CATS[ep.cat]||cat;
      return `<div class="sermon-item" style="border-left:3px solid ${ec.color}">
        <div class="s-label">Sermon ${si+1}${ep.series?' · '+ep.series:''}</div>
        <div class="s-title">${ep.title}</div>
        <div class="s-desc">${ep.desc}</div>
        <a class="spotify-btn" href="${spLink(ep)}" target="_blank" rel="noopener">${SPOTIFY_SVG} Listen on Spotify</a>
      </div>`;
    }).join('');
    const noteVal=(notes[k]||'').replace(/"/g,'&quot;');
    card.innerHTML=`
      <div class="day-row" onclick="toggleDay(${currentWeek},${di})">
        <button class="check-btn${isDone?' done':''}" onclick="event.stopPropagation();toggleCheck(${currentWeek},${di})"><span class="check-icon"></span></button>
        <div class="day-meta"><div class="day-name">${day.day}</div><div class="day-topic">${day.topic}</div></div>
        <span class="cat-tag" style="color:${cat.color};border-color:${cat.color}50">${cat.label}</span>
        <svg class="chevron${isOpen?' open':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="day-body${isOpen?' open':''}">
        ${sermons}
        ${isDone?'<div class="done-tick">✓ Marked as listened</div>':''}
        <div class="notes-wrap">
          <div class="notes-lbl">Reflection notes</div>
          <textarea class="notes-ta" placeholder="What did God speak to you today?" oninput="saveNote(${currentWeek},${di},this.value)">${noteVal}</textarea>
        </div>
      </div>`;
    list.appendChild(card);
  });
  renderStats();
}

function changeWeek(dir){currentWeek=Math.max(0,Math.min(WEEKS.length-1,currentWeek+dir));renderSchedule()}
function toggleDay(wi,di){const k=K(wi,di);openDays[k]=!openDays[k];renderSchedule()}
function toggleCheck(wi,di){const k=K(wi,di);checked[k]=!checked[k];lsSave();renderSchedule();if(activePage==='overview')renderOverview()}
function saveNote(wi,di,val){notes[K(wi,di)]=val;lsSave()}

function renderBrowse(){
  const filterRow=document.getElementById('filter-row');
  const allCats=['all',...Object.keys(CATS)];
  filterRow.innerHTML=allCats.map(c=>{
    const isAll=c==='all',col=isAll?'#C9A050':(CATS[c]?.color||'#C9A050'),lbl=isAll?'All':CATS[c].label;
    return `<span class="filter-chip${browseFilter===c?' active':''}" style="color:${col};border-color:${col}50" onclick="setBrowseFilter('${c}')">${lbl}</span>`;
  }).join('');
  const epList=document.getElementById('ep-list');
  const filtered=browseFilter==='all'?EP:EP.filter(e=>e.cat===browseFilter);
  epList.innerHTML=filtered.map(ep=>{
    const cat=CATS[ep.cat]||CATS.faith;
    return `<div class="ep-card" style="border-left:3px solid ${cat.color}">
      <div class="ep-top"><div class="ep-title">${ep.title}</div><div class="ep-date">${ep.date}</div></div>
      ${ep.series?`<div class="ep-series">${ep.series}</div>`:''}
      <div class="ep-desc">${ep.desc}</div>
      <div class="ep-footer">
        <span class="ep-dur">⏱ ${ep.dur}</span>
        <a class="spotify-btn" href="${spLink(ep)}" target="_blank" rel="noopener">${SPOTIFY_SVG} Open</a>
      </div>
    </div>`;
  }).join('');
}

function setBrowseFilter(cat){browseFilter=cat;renderBrowse()}

function renderOverview(){
  const wrap=document.getElementById('ov-wrap');
  let html=`<div class="ov-lbl">4-week plan</div>`;
  WEEKS.forEach((w,wi)=>{
    const done=doneW(wi),total=w.days.length,pct=Math.round((done/total)*100);
    html+=`<div class="ov-week-card" onclick="jumpToWeek(${wi})">
      <div class="ov-wk-top"><span class="ov-wk-num">Week ${w.week}</span><span class="ov-wk-count">${done}/${total} done</span></div>
      <div class="ov-wk-theme">${w.theme}</div>
      <div class="mini-track"><div class="mini-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  html+=`<div class="ov-lbl" style="margin-top:22px">Category key</div><div class="cat-legend">`;
  Object.entries(CATS).forEach(([,v])=>{html+=`<div class="cat-leg-item"><div class="cat-leg-dot" style="background:${v.color}"></div><span>${v.label}</span></div>`;});
  html+=`</div>`;
  html+=`<div class="ov-lbl" style="margin-top:22px">Open podcast</div>
    <a class="spotify-btn" href="${SHOW_URL}" target="_blank" rel="noopener" style="display:flex;justify-content:center;padding:11px;font-size:12px">
      ${SPOTIFY_SVG} Full CCI Podcast on Spotify
    </a>`;
  wrap.innerHTML=html;
}

function jumpToWeek(wi){currentWeek=wi;switchTab('schedule')}

function switchTab(tab){
  activePage=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  const idx={schedule:0,browse:1,overview:2}[tab];
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if(tab==='schedule')renderSchedule();
  if(tab==='browse')renderBrowse();
  if(tab==='overview')renderOverview();
}

lsLoad();
renderSchedule();
</script>
</body>
</html>
